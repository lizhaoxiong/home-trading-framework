<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=1.0, user-scalable=yes, minimum-scale=0.1, maximum-scale=10.0">
<script>
(function(){
  var scale = Math.min(1.0, (window.screen.width || 375) / 1200);
  document.querySelector('meta[name=viewport]').setAttribute('content',
    'width=1200, initial-scale=' + scale + ', user-scalable=yes, minimum-scale=0.1, maximum-scale=10.0');
})();
</script>
<title>交易框架</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    color: #e0e6f0;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px 16px;
    user-select: none;
    touch-action: manipulation;
  }

  /* 顶部标题 */
  .page-title {
    width: 100%; max-width: 1060px;
    text-align: center;
    font-size: 20px; font-weight: 900; letter-spacing: 10px;
    background: linear-gradient(90deg, #7ec8e3 0%, #ffffff 50%, #f0b87e 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  /* 主网格：左雷达列 | 股票中列 | 右雷达列 */
  .main-grid {
    display: grid;
    grid-template-columns: auto auto auto;
    align-items: center;
    width: 100%; max-width: 1160px;
    gap: 0;
  }
  .radar-col { display: flex; flex-direction: column; gap: 0; }
  .radar-card { display: flex; flex-direction: column; align-items: center; padding: 0; margin: 0; }
  canvas { cursor: crosshair; display: block; }

  /* 中间股票列 */
  .stock-center-col {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 0; width: 180px;
  }
  canvas { cursor: crosshair; display: block; }

  /* 底部多列区 */
  .bottom-zone {
    width: 100%; max-width: 1060px;
    margin-top: 24px;
    display: flex; gap: 32px; justify-content: center; align-items: flex-start;
  }

  /* 亏损来源 */
  .loss-col {
    display: flex; flex-direction: column; gap: 14px;
    min-width: 220px; max-width: 260px;
  }
  .loss-list {
    display: flex; flex-direction: column; gap: 6px;
  }
  .loss-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,80,80,0.08);
    background: rgba(255,60,60,0.04);
    font-size: 12px; color: #8a7a88; line-height: 1.4;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .loss-num {
    flex-shrink: 0;
    color: rgba(255,100,100,0.4);
    font-size: 11px; font-weight: 700;
    margin-top: 1px;
  }
  .list-col {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    min-width: 260px;
  }
  .list-header {
    font-size: 13px; font-weight: 700; letter-spacing: 3px;
    color: rgba(255,255,255,0.25);
  }

  /* 列表 */
  .item-list { display: flex; flex-direction: column; gap: 6px; width: 260px; min-height: 10px; }

  .item-chip {
    display: flex; align-items: center;
    border-radius: 10px; border: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.04);
    font-size: 13px; font-weight: 600; color: #7a8eaa; letter-spacing: 1px;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    cursor: default;
  }
  .item-chip:hover { background: rgba(255,255,255,0.08); }
  .item-chip.active { border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.09); color: #e8f0ff; }
  .item-chip.drag-over { border-color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.12); }
  .item-chip.dragging { opacity: 0.35; }

  .drag-handle {
    padding: 10px 8px 10px 12px; color: rgba(255,255,255,0.15);
    font-size: 14px; cursor: grab; flex-shrink: 0; line-height: 1;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle:hover { color: rgba(255,255,255,0.4); }

  .item-name-input {
    flex: 1; margin: 5px 4px; padding: 4px 8px;
    background: transparent; border: 1px solid transparent; border-radius: 6px;
    color: #c8d8f0; font-size: 13px; font-weight: 600;
    font-family: inherit; letter-spacing: 1px; outline: none; min-width: 0;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
  }
  .item-name-input:hover { border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); }
  .item-name-input:focus { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); cursor: text; }
  .item-chip.active .item-name-input { color: #e8f0ff; }

  .btn-del {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 6px; border: none;
    font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    background: rgba(255,80,80,0.08); color: rgba(255,100,100,0.5); margin-right: 6px; transition: all 0.15s;
  }
  .btn-del:hover { background: rgba(255,80,80,0.22); color: #ff6060; }

  .add-row { display: flex; gap: 8px; align-items: center; }
  .add-input {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 8px 16px; color: #e0e6f0;
    font-size: 13px; font-family: inherit; outline: none; width: 180px; text-align: center;
    transition: border-color 0.15s;
  }
  .add-input::placeholder { color: rgba(255,255,255,0.18); }
  .add-input:focus { border-color: rgba(255,255,255,0.28); }
  .add-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07);
    color: #e0e6f0; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .add-btn:hover { background: rgba(255,255,255,0.14); }
  .add-btn:active { transform: scale(0.9); }
  .add-btn:disabled { opacity: 0.2; cursor: default; }
  .item-count { font-size: 11px; color: #2e3a52; letter-spacing: 1px; }

  .save-status {
    position: fixed; bottom: 18px; right: 22px;
    font-size: 11px; letter-spacing: 1px; padding: 5px 12px; border-radius: 20px;
    transition: opacity 0.4s; pointer-events: none;
  }
  .save-status.saving { background: rgba(255,200,80,0.12); color: rgba(255,200,80,0.7); opacity: 1; }
  .save-status.saved  { background: rgba(80,200,130,0.12); color: rgba(80,200,130,0.7); opacity: 1; }
  .save-status.hidden { opacity: 0; }
</style>
</head>
<body>

<!-- 顶部标题 -->
<div class="page-title">交易模式</div>

<!-- 主网格：左雷达 | 股票 | 右雷达 -->
<div class="main-grid">

  <!-- 左列：赚钱效应 + 审美 -->
  <div class="radar-col">
    <div class="radar-card"><canvas id="radarMoney" width="462" height="462"></canvas></div>
    <div class="radar-card"><canvas id="radarLeft"  width="462" height="462"></canvas></div>
  </div>

  <!-- 中列：股票列表 -->
  <div class="stock-center-col">
    <div class="list-header">股票</div>
    <div class="item-list" id="stockList"></div>
    <div class="add-row">
      <input class="add-input" id="stockInput" placeholder="输入股票名称" maxlength="16">
      <button class="add-btn" id="stockAddBtn" onclick="addItem('stock')">＋</button>
      <span class="item-count" id="stockCount">0 / 6</span>
    </div>
  </div>

  <!-- 右列：风险 + 计划 -->
  <div class="radar-col">
    <div class="radar-card"><canvas id="radarRisk"  width="462" height="462"></canvas></div>
    <div class="radar-card"><canvas id="radarRight" width="462" height="462"></canvas></div>
  </div>

</div>

<!-- 底部：题材 + 亏损来源 -->
<div class="bottom-zone">

  <!-- 题材列表 -->
  <div class="list-col">
    <div class="list-header">题材</div>
    <div class="item-list" id="themeList"></div>
    <div class="add-row">
      <input class="add-input" id="themeInput" placeholder="输入题材名称" maxlength="16">
      <button class="add-btn" id="themeAddBtn" onclick="addItem('theme')">＋</button>
      <span class="item-count" id="themeCount">0 / 6</span>
    </div>
  </div>

  <!-- 亏损来源 -->
  <div class="loss-col">
    <div class="list-header">亏损来源</div>
    <div class="loss-list">
      <div class="loss-item"><span class="loss-num">1</span><span>图形明显走弱不走，撤退不及时</span></div>
      <div class="loss-item"><span class="loss-num">2</span><span>幻想心存侥幸，虚妄回本，不切实际心态</span></div>
      <div class="loss-item"><span class="loss-num">3</span><span>无计划不复盘，随机买卖</span></div>
      <div class="loss-item"><span class="loss-num">4</span><span>交易独立性，因上一笔交易错过下一笔交易</span></div>
      <div class="loss-item"><span class="loss-num">6</span><span>方向有变，不及时调整</span></div>
      <div class="loss-item"><span class="loss-num">7</span><span>频繁交易，不空仓，耐心等待</span></div>
      <div class="loss-item"><span class="loss-num">8</span><span>不断找机会，什么肉都想吃，同追两兔子</span></div>
      <div class="loss-item"><span class="loss-num">9</span><span>不知道自己赚什么钱，买入持有理由不充分</span></div>
    </div>
  </div>

</div>

<div class="save-status hidden" id="saveStatus"></div>

<script>
/* ─────────────── RadarChart ─────────────── */
class RadarChart {
  constructor(canvasId, labels, color, centerLabel, onDragEnd, maxROffset) {
    this.canvas = document.getElementById(canvasId);
    this.ctx = this.canvas.getContext('2d');
    this.labels = labels; this.color = color; this.centerLabel = centerLabel;
    this.onDragEnd = onDragEnd;
    this.n = labels.length;
    this.W = this.canvas.width; this.H = this.canvas.height;
    this.cx = this.W / 2; this.cy = this.H / 2;
    this.maxR = Math.min(this.W, this.H) / 2 - (maxROffset || 115);
    this.angles = labels.map((_, i) => (Math.PI * 2 * i / this.n) - Math.PI / 2);
    this.dragging = -1;
    this.activeValues = null;
    this.canvas.addEventListener('mousedown', e => this.onDown(e));
    this.canvas.addEventListener('mousemove', e => this.onMove(e));
    this.canvas.addEventListener('mouseup',   () => this.onUp());
    this.canvas.addEventListener('mouseleave',() => this.onUp());
    this.canvas.addEventListener('touchstart', e => { if (e.touches.length === 1) { e.preventDefault(); this.onDown(e.touches[0]); } }, { passive: false });
    this.canvas.addEventListener('touchmove',  e => { if (e.touches.length === 1) { e.preventDefault(); this.onMove(e.touches[0]); } }, { passive: false });
    this.canvas.addEventListener('touchend',   () => this.onUp());
    this.draw();
  }
  setValues(v) { this.activeValues = v; this.draw(); }
  clearValues() { this.activeValues = null; this.draw(); }
  getPos(e) {
    const r = this.canvas.getBoundingClientRect();
    return { x: (e.clientX - r.left) * (this.W / r.width), y: (e.clientY - r.top) * (this.H / r.height) };
  }
  getPointPos(i) {
    const v = this.activeValues ? this.activeValues[i] : 0.5;
    return { x: this.cx + this.maxR * v * Math.cos(this.angles[i]), y: this.cy + this.maxR * v * Math.sin(this.angles[i]) };
  }
  onDown(e) {
    if (!this.activeValues) return;
    const pos = this.getPos(e);
    for (let i = 0; i < this.n; i++) {
      const p = this.getPointPos(i);
      if ((pos.x-p.x)**2 + (pos.y-p.y)**2 < 256) { this.dragging = i; return; }
    }
  }
  onMove(e) {
    if (this.dragging < 0 || !this.activeValues) return;
    const pos = this.getPos(e);
    const a = this.angles[this.dragging];
    let v = ((pos.x - this.cx) * Math.cos(a) + (pos.y - this.cy) * Math.sin(a)) / this.maxR;
    this.activeValues[this.dragging] = Math.max(0.05, Math.min(1.0, v));
    this.draw();
  }
  onUp() {
    if (this.dragging >= 0) { this.dragging = -1; this.onDragEnd && this.onDragEnd(); }
    else this.dragging = -1;
  }
  rgb() { const m = this.color.match(/\d+/g); return `${m[0]},${m[1]},${m[2]}`; }
  wrapLines(text) {
    return text.length > 4 ? [text.slice(0, 4), text.slice(4)] : [text];
  }
  draw() {
    const { ctx, cx, cy, maxR, n, angles } = this;
    const vals = this.activeValues || new Array(n).fill(0.5);
    const has = !!this.activeValues;
    const rgb = this.rgb();
    ctx.clearRect(0, 0, this.W, this.H);
    // 网格
    for (let l = 1; l <= 4; l++) {
      const r = maxR * l / 4;
      ctx.beginPath();
      angles.forEach((a, i) => { const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
      ctx.closePath(); ctx.strokeStyle=`rgba(255,255,255,${0.03+l*0.025})`; ctx.lineWidth=1; ctx.stroke();
    }
    // 轴线
    angles.forEach(a => {
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+maxR*Math.cos(a),cy+maxR*Math.sin(a));
      ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=1; ctx.stroke();
    });
    // 多边形
    ctx.beginPath();
    angles.forEach((a,i) => { const r=maxR*vals[i]; const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    ctx.closePath();
    ctx.fillStyle=has?`rgba(${rgb},0.14)`:`rgba(255,255,255,0.03)`; ctx.fill();
    ctx.strokeStyle=has?`rgba(${rgb},0.85)`:`rgba(255,255,255,0.1)`; ctx.lineWidth=has?2:1.5; ctx.stroke();
    // 顶点
    angles.forEach((a,i) => {
      const p = this.getPointPos(i);
      if (has) {
        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,10);
        g.addColorStop(0,`rgba(${rgb},0.5)`); g.addColorStop(1,`rgba(${rgb},0)`);
        ctx.beginPath(); ctx.arc(p.x,p.y,10,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
        ctx.beginPath(); ctx.arc(p.x,p.y,this.dragging===i?7:5,0,Math.PI*2);
        ctx.fillStyle=`rgba(${rgb},1)`; ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.75)'; ctx.lineWidth=1.5; ctx.stroke();
      } else {
        ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fill();
      }
    });
    // 标签（自动换行）
    const lineH = 13;
    angles.forEach((a,i) => {
      const lR=maxR+42; const x=cx+lR*Math.cos(a), y=cy+lR*Math.sin(a);
      if (Math.cos(a)>0.3) ctx.textAlign='left'; else if (Math.cos(a)<-0.3) ctx.textAlign='right'; else ctx.textAlign='center';
      ctx.textBaseline='middle';
      const lines = this.wrapLines(this.labels[i]);
      const totalH = (lines.length - 1) * lineH;
      ctx.fillStyle='rgba(200,218,240,0.85)'; ctx.font='11px PingFang SC,Microsoft YaHei,sans-serif';
      lines.forEach((line, li) => ctx.fillText(line, x, y - totalH/2 + li * lineH));
      if (has) {
        ctx.font='10px PingFang SC,sans-serif'; ctx.fillStyle=`rgba(${rgb},0.6)`;
        ctx.fillText(`${Math.round(vals[i]*100)}%`, x, y + totalH/2 + 12);
      }
    });
    // 中心标签（始终显示）
    ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2);
    ctx.fillStyle=`rgba(${rgb},${has?0.9:0.25})`; ctx.fill();
    ctx.font='bold 13px PingFang SC,Microsoft YaHei,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=`rgba(${rgb},${has?1:0.3})`;
    ctx.fillText(this.centerLabel, cx, cy+20);
  }
}

/* ─────────────── 自动保存 ─────────────── */
let saveTimer = null;
const statusEl = document.getElementById('saveStatus');
let hideTimer = null;

function scheduleSave() {
  clearTimeout(saveTimer);
  showStatus('saving', '保存中…');
  saveTimer = setTimeout(saveData, 600);
}
function showStatus(cls, text) {
  clearTimeout(hideTimer);
  statusEl.className = `save-status ${cls}`;
  statusEl.textContent = text;
}
async function saveData() {
  try {
    await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stocks, activeStockIdx, themes, activeThemeIdx, moneyValues, riskValues })
    });
    showStatus('saved', '已保存 ✓');
    hideTimer = setTimeout(() => { statusEl.className = 'save-status hidden'; }, 2000);
  } catch (e) { showStatus('saving', '保存失败'); }
}
async function loadData() {
  try {
    const res = await fetch('/api/data');
    const d = await res.json();
    stocks         = d.stocks        || [];
    themes         = d.themes        || [];
    activeStockIdx = d.activeStockIdx ?? d.activeIdx ?? -1;
    activeThemeIdx = d.activeThemeIdx ?? -1;
    if (d.moneyValues) moneyValues.splice(0, 6, ...d.moneyValues);
    if (d.riskValues)  riskValues.splice(0,  6, ...d.riskValues);
    if (activeStockIdx >= stocks.length) activeStockIdx = stocks.length - 1;
    if (activeThemeIdx >= themes.length) activeThemeIdx = themes.length - 1;
    syncRadars();
    renderList('stock');
    renderList('theme');
  } catch (e) { stocks = []; themes = []; activeStockIdx = -1; activeThemeIdx = -1; }
  radarMoney.setValues(moneyValues);
  radarRisk.setValues(riskValues);
}

/* ─────────────── 初始化雷达 ─────────────── */
let moneyValues = new Array(6).fill(0.5);
let riskValues  = new Array(6).fill(0.5);

const radarMoney = new RadarChart('radarMoney',
  ['连板打高度','创业板20cm','N字涨停突破','趋势加速破前高','低吸反核地天','人气抱团'],
  'rgba(100,220,140,1)', '赚钱效应', scheduleSave, 120);

const radarRisk = new RadarChart('radarRisk',
  ['严重异动监管趋严','高度限制烂板天地','加速高潮','拉萨包场散户接盘','日K分时图形难看','亏钱效应开始'],
  'rgba(255,100,100,1)', '风险', scheduleSave, 120);

const radarL = new RadarChart('radarLeft',
  ['唯一辨识度','题材地位','冰点表现','连板梯队','超预期','主升突破'],
  'rgba(126,200,227,1)', '审美', scheduleSave, 115);

const radarR = new RadarChart('radarRight',
  ['早盘低吸','下午低吸','竞价买入','早盘跟随','早盘打板','空仓等待'],
  'rgba(240,184,126,1)', '计划', scheduleSave, 115);

/* ─────────────── 数据 ─────────────── */
let stocks = [], themes = [];
let activeStockIdx = -1, activeThemeIdx = -1;

function syncRadars() {
  if (activeStockIdx >= 0 && stocks[activeStockIdx]) {
    radarL.setValues(stocks[activeStockIdx].valLeft);
    radarR.setValues(stocks[activeStockIdx].valRight);
  } else { radarL.clearValues(); radarR.clearValues(); }
}

/* ─────────────── 通用列表操作 ─────────────── */
function getListConfig(type) {
  return type === 'stock'
    ? { list: stocks, getActive: () => activeStockIdx, setActive: v => activeStockIdx = v, listId: 'stockList', inputId: 'stockInput', btnId: 'stockAddBtn', countId: 'stockCount' }
    : { list: themes, getActive: () => activeThemeIdx, setActive: v => activeThemeIdx = v, listId: 'themeList', inputId: 'themeInput', btnId: 'themeAddBtn', countId: 'themeCount' };
}

function addItem(type) {
  const cfg = getListConfig(type);
  if (cfg.list.length >= 6) return;
  const input = document.getElementById(cfg.inputId);
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  if (type === 'stock') {
    cfg.list.push({ name, valLeft: new Array(6).fill(0.5), valRight: new Array(6).fill(0.5) });
  } else {
    cfg.list.push({ name });
  }
  input.value = '';
  cfg.setActive(cfg.list.length - 1);
  if (type === 'stock') syncRadars();
  renderList(type); scheduleSave();
}

function selectItem(type, idx) {
  const cfg = getListConfig(type);
  if (cfg.getActive() === idx) return;
  cfg.setActive(idx);
  if (type === 'stock') syncRadars();
  document.querySelectorAll(`#${cfg.listId} .item-chip`).forEach((c, i) => c.classList.toggle('active', i === idx));
  scheduleSave();
}

function deleteItem(type, idx) {
  const cfg = getListConfig(type);
  cfg.list.splice(idx, 1);
  if (cfg.getActive() >= cfg.list.length) cfg.setActive(cfg.list.length - 1);
  if (type === 'stock') syncRadars();
  renderList(type); scheduleSave();
}

/* ─────────────── 渲染列表 ─────────────── */
const dragState = { src: -1, type: null };

function renderList(type) {
  const cfg = getListConfig(type);
  const listEl = document.getElementById(cfg.listId);
  const countEl = document.getElementById(cfg.countId);
  const btnEl = document.getElementById(cfg.btnId);
  listEl.innerHTML = '';

  cfg.list.forEach((s, i) => {
    const chip = document.createElement('div');
    chip.className = 'item-chip' + (i === cfg.getActive() ? ' active' : '');
    chip.draggable = false;
    chip.innerHTML =
      `<span class="drag-handle" title="拖动排序">⠿</span>` +
      `<input class="item-name-input" value="${s.name}" maxlength="16" title="点击编辑">` +
      `<button class="btn-del" title="删除">✕</button>`;

    const nameInput = chip.querySelector('.item-name-input');
    nameInput.addEventListener('mousedown', () => selectItem(type, i));

    const handle = chip.querySelector('.drag-handle');
    handle.addEventListener('mousedown', () => { selectItem(type, i); chip.draggable = true; });
    handle.addEventListener('mouseup',   () => { chip.draggable = false; });
    document.addEventListener('mouseup', () => { chip.draggable = false; });

    nameInput.addEventListener('blur', () => {
      const val = nameInput.value.trim();
      if (val && val !== s.name) { s.name = val; scheduleSave(); }
      else if (!val) nameInput.value = s.name;
    });
    nameInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') nameInput.blur();
      if (e.key === 'Escape') { nameInput.value = s.name; nameInput.blur(); }
    });

    chip.querySelector('.btn-del').addEventListener('click', e => { e.stopPropagation(); deleteItem(type, i); });

    chip.addEventListener('dragstart', e => {
      dragState.src = i; dragState.type = type;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => chip.classList.add('dragging'), 0);
    });
    chip.addEventListener('dragend', () => {
      chip.draggable = false; dragState.src = -1;
      document.querySelectorAll('.item-chip').forEach(c => c.classList.remove('dragging','drag-over'));
    });
    chip.addEventListener('dragover', e => {
      e.preventDefault(); e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll(`#${cfg.listId} .item-chip`).forEach(c => c.classList.remove('drag-over'));
      if (i !== dragState.src) chip.classList.add('drag-over');
    });
    chip.addEventListener('dragleave', () => chip.classList.remove('drag-over'));
    chip.addEventListener('drop', e => {
      e.preventDefault();
      if (dragState.src < 0 || dragState.src === i || dragState.type !== type) return;
      const moved = cfg.list.splice(dragState.src, 1)[0];
      cfg.list.splice(i, 0, moved);
      const active = cfg.getActive();
      if (active === dragState.src) cfg.setActive(i);
      else if (dragState.src < active && i >= active) cfg.setActive(active - 1);
      else if (dragState.src > active && i <= active) cfg.setActive(active + 1);
      dragState.src = -1;
      if (type === 'stock') syncRadars();
      renderList(type); scheduleSave();
    });

    listEl.appendChild(chip);
  });

  countEl.textContent = `${cfg.list.length} / 6`;
  btnEl.disabled = cfg.list.length >= 6;
}

document.getElementById('stockInput').addEventListener('keydown', e => { if (e.key === 'Enter') addItem('stock'); });
document.getElementById('themeInput').addEventListener('keydown', e => { if (e.key === 'Enter') addItem('theme'); });

loadData();
</script>
</body>
</html>
